  text: 第一卷科釋玄義二初釋題二初釋題二說記人二初能說人二記錄人二釋文二初釋序文二初敘真應益物二初正明真應二初示二身妙用三初明體妙故二用泯亡二初法融應泯二真如下性淨真亡二雖像下明用忘故二益周徧二初顯益周二化無下冥益徧三故無下遮照相即結二身德相二初應身相二處有下真身德二是以下明兩用攝生二故娑下兼明本迹二初示諸名二初今昔因名二已成下過未果號二其本下結難測二今言下敘人法標題二初敘人兼經字二初敘人二初對梵翻名二能所下約華釋義二初別釋二初釋二初釋觀字二初中邊妙達二照窮下修性俱明二釋世音二菩薩下結二此即下總示二敘經二普門下敘法兼品二初敘法二初消二字二用一下示十普二敘品二釋正文二大部下釋正文二初例大部二釋名下釋今文五初釋名四初列章二通者下示相三何故下對根四今就下正釋二初通釋二初標列二一列下正釋四初列名三初略標示二立名意二初理超名數二但妙下名數顯理二初約義示二故大下引文證三今處下正列名二初明中當二十義下正標列二次第三初標示兩意二初正標示二約觀下明總該二約觀下解釋兩意二初觀次第十初人法二初冠九句二人法下當科次第二初疑二此須下釋二慈悲二初十中次第二二法前後三福慧四真應五藥珠六冥顯七權實八本迹九緣了二初指前順論自他二明今却討種子十智斷二二約下教次第二初牒章立門二通義下依門解釋二初通二別今下別二初五味二初釋五初乳二初明具二而未下明闕後四義二初明通別二初明無別二通義下許有通二何故下明闕具二初約化始明闕二所以下對具明闕二初對法華二對涅槃二次約下酪二初大師明闕具二初正明闕具二何故下明闕具所以二私難下章安私料簡二初正料簡二初難二私答下釋二師云下指師意三生酥四熟酥五若約下醍醐二初法華二初明部彰八意二三世下化滿一期二若約下涅槃二初明攝機罄盡二若論下明示法無遺二此歷下結二約四下四教三故知下結歎兩意二初結歎二問云下料簡三解釋四料簡二第二下別釋二辨體三明宗四論用五判教第三解釋三初略標二人即下廣釋十初人法三初立二此之下釋二初總示二初示通凡聖二若色下各明假實二初凡二戒定下聖二初示相二故大下引證二雖通下委釋二初凡二聖人下聖二初小三初就有門釋二若空下就空門釋三餘兩下例二門釋二摩訶下衍三初明體空通三教二以觀下明緣了通別圓二初了因二緣因三以觀下明即離唯圓頓二初約六法示三因二初引經標即離二不即下據理明即離二佛從下約三性明分證三前一下結二初結指經文二當知下結歸題目二慈悲三初標示二菩薩下解釋二初約四誓論功二初明須誓三初須誓意二譬如下舉喻顯三誓願下牒喻結二慈心下示運心二初二誓明悲二以慈下二誓明慈二但前下約四教辨相二初例前科二若三下明四教依諦立誓四初三藏二復次下通教三別教四圓教二初示四誓二初明誓相二譬下明無緣二初譬二今此下法二菩薩下明六即三若前下結歸二初結指經文二故知下結歸題目三福慧四真應五藥珠六冥顯七權實八本迹九緣了十智斷三問此下貼文為證第二卷科三福慧三初標示異名二定名下依名釋義二初明二法功能四初定慧之功二寂照下福智之德三亦稱下目足之稱四涅槃下莊嚴之名二釋此下約四教解釋二初明四教二今圓下示圓六即三觀音下結指經題二初指經文二良以下結歸題目四真應三初標名示義二若契下對揀是非二初約法示三初法二譬如下喻三此之下結二若外下就人簡二初簡小外二大乘下示圓人二初明二身二菩薩下示六即三今經下結指經目二初指經文二良以下結題目五藥珠三初標名示教二應歷下約教辨能二初略指三二今約下應明圓二初釋二身二初藥樹身二初喻二菩薩下法二又如下珠王身二初喻二菩薩下法二此亦下辨六即三就前下結指經目二初指經文二故知下結題目六冥顯三初釋名二大聖下辨相二初明二益三初示相二譬如下舉譬三故藥下引證二此亦下辨六即三若就下結指二初指經文二故知下結題目七權實三初釋名二略言下辨相二初泛明三種二初總示三種二用此下徧歷諸教二初略指四教二復就下明圓六即二尋此下別用第三三前問下結歸二初結指經文二故知下結歸題目八本迹三初名義二若通下解釋二初通凡漸二局圓聖二初局分滿二初略示二若一下簡判二初簡一往二今細下取細明二初約義明二初明本迹通高下二何以下明實得辨是非二故壽下引文證二就本下通六即三就前下結歸二初指經文二故知下結題目九緣了三初標示名義三初示名義二了者下辨流類三大論下引論釋二通論下依教解釋二初諸教皆具二今正下剋就圓論二初尅辨二因二初明二種因果二原此下討二種根本三初總明性德二大經下別引文釋二初證釋了因二又云下證釋緣因三以此下依性立修二此一下不論六即三前問下結指經題二初指經文二故知下結題目十智斷三初略標二通途下廣釋二初不二而二明智斷二初約通途明二德二初智德二初列異名二言有下釋有為二斷即下斷德二初列異名二言無下釋斷義二初簡小二大乘下明大二初正示二故淨下引證二寂而下約寂照簡非德二如此下二而不二明三德二初約即三明理極二初明二三不殊二法身下明因果無別二初別示三法因果二初法身隱顯二又云下二德修性二佛性下總示三法因果二初約義示二故普下引文證二智德下復就二符經文三前問下結歸二初指經文二故知下結題目三問此下貼文為證二初約無文立難二答下約有義答通三初明衍義眾經共用二初約法義明二若不下以人師驗二此品下以二問答貼義無虧三今已下別點句句證十義二初結前有義開後有文二如文下約句對義四料簡二初別料簡十初簡人法二初問一二答二初立句二初泛立四句二若約下以部對句二初明諸部人法即離四初華嚴二三藏三方等四般若下例餘二今方下明難屬方等即句二今明下通難三初正約即句通難二例如下傍取人物例顯三初以人顯二譬如下舉物喻三今普下以人法互具結示三初明法具人二若併下明人具法三如身下以身為例二簡慈悲二初簡慈名相三初明與同異二初與相兼問二答通下與不俱答二明喜捨闕具二初問二答二初不二是捨二喜者下苦在闕喜二初約法釋二如阿下引事例三問禪下明禪支前後二初約前後問二答禪下約自他答二復次下簡與有無三初外道虛想二若二下明二乘自利三今菩下明菩薩徧益二初明行超凡聖二明同時與三簡福慧四簡真應五簡藥珠六簡冥顯七簡權實八簡本迹九簡緣了十簡智斷二若深下總結益三簡福慧二初定福智與所以二初問二答二問福下辨福慧一異是非二初約隔異難二自有下約偏圓答二初立即離四句二如六下通偏圓諸教二初明三教即離俱非二初明小衍二初三藏二若大下大乘二方等下例二部二今此下明圓教開合俱是二初釋二初二而不二三初明相即二故大下明互具三大經下明異名二不二下不二而二二此是下結四簡真應二初正簡真應二初立句二若非下簡示二初簡前三句非二亦真下示後一句是二今依下兼定常問三初一往且分二常問下二往互具二初立二若小下釋二初小二大乘下大三而今下順文別對五簡藥珠二初依義互具二若別下就文別對六簡冥顯七簡權實二初定文立難二立句答通二初詳論互具二據說且分八簡本迹二初本迹俱與二初各具二用二非本下相由貼文二問本下本迹異真應二初問二答九簡緣了二初約當宗問答四初明善惡法門性德皆具二初問二答二提佛但斷修中善惡二初問二答三明性中善惡不斷所以二初問二答二初約理答二譬如下舉譬類四明提佛迷達起不起異二初問二答二初以了達故不起實惡二以自下以自在故能起權惡二若依下破他義顯正二初敘他非義二初明他得修失性二問若下難他作意同外二今明下明今妙旨二初正明由性具善惡起權實善惡二初正示今義二以有下結成妙旨二如來下重明由達由達故自在不自在十簡智斷二初明二德同時二初舉一法難與拔二用二然而下約身心從二嚴立稱二今經下示兩文互舉二若深下總結益第二別釋二初標列二以何下解釋二初釋觀世音二初結前生後二段二云何下依別委釋二初揀示境智二初標科二一天下釋相二初明思議二初約理外二初立四初天然二相待三因緣四絕待二竝是下破二初總約性執斥三初約理外斥二故中下引中論斥三計執下約起過斥二云何下別示四性過二初自生二初舉過二初約能迷所迷二初能迷諸惑二此則下所迷諸法二若作下約能執所執二初能執性計二初正判屬計二故大下引大論證二今凡下所執正教二今不下結非二自生下例三二二明下約理內二初示相二初明理內二雖見下斥作意二今明下結非二次明下不思議二初據前破性難二答經下離性四悉答二初辨相二初四悉檀相二初明赴機四悉二初明四相二雖作下辨離情二如是下明能顯正法二若以下不思議相二初再明思議二若不下正明不思議三初約義示二金光下引經證三此具下指大本二龍樹下引類二夫依下正釋境智二初定前後二世者下依義釋二初釋境二初釋世二初釋名義二初示世分三種二初直例三種二既有下義須至三二世是下辨三通十界二初約依正明世間二各各下約因果明法界二今就下示妙境二初示妙義二初明三千緣起二是諸下示三諦妙境二此境下該三法二初約三人分二境二問自下引二經明各具二初問二答二釋音二初約口業正釋二問下明三業俱機二初問起二然通下答釋二初正明起通二而今下對偏顯圓二初明古偏局六初趣舉二隨俗三互舉二初正釋二舊問下通難二初他難二舊答下古通三初敘古通二今更下今戴難三今不下今為通四義攝五隱顯六難易二初難急口機易二又第下誓深宜急稱二今明下引論圓釋二初以覺觀況音聲二但舉下明觀音圓感應二釋觀智二明普門第三卷科第二釋境智二初標列二結境下解釋二初結束世音之境二二明下正明能觀之智二初泛明諸境觀二今約下的明今境觀二初示境通別二今對下明觀漸頓二初雙列二次第下雙釋二初歷教釋二種觀二初偏圓竝釋二初約諸部釋五初依瓔珞明三觀二此之下依大品明三智二初正明三智相二通而下對上辨通別三此三下一大經四智二初略示四智相二涅槃下對上判離合四若將下以觀智對五眼五中論下以中論四句結二若將下對四教釋二初正對四教二初正對教二所以下出所以二教必下廣明四相二初四教主二初明教主一異二四教下明補處偏圓二若言下四教法二初明理尚無一二答理下明赴緣說四二初明赴緣二三藏下明說四四初三藏三初明教相二初明願行二初依諦立誓二行六下依誓立行二初六度填願二行此下六度滿時二如此下明時位三初約持明行相二用此下約觀明涉位三此中下約佛明補處二若就下結觀智三料簡二初簡超劫二初問二答二簡百劫二初問二答二通教二初明教相二初示名教二此事下辨行相二初斥三藏明行相二初對事度顯空